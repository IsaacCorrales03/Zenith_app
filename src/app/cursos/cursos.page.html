<app-header></app-header>
<ion-content [fullscreen]="true">
  <div class="container">
    <div class="header-container">
      <ion-text class="title"><h1>Cursos</h1></ion-text>
      <ion-button (click)="get_cursos()">
        <ion-icon name="refresh-outline"></ion-icon>
      </ion-button>
    </div>
    
    <!-- Lista de cursos -->
    <div class="cursos-list" *ngIf="cursos && cursos.length > 0">
      <ion-grid>
        <ion-row>
          <ion-col size="12" size-md="6" size-lg="4" *ngFor="let curso of cursos">
            <div class="curso-card">
              <div class="curso-background" [style.background-image]="'url(' + (curso.Course_Image || 'assets/placeholder-curso.jpg') + ')'">
                <div class="curso-overlay">
                  <div class="curso-content">
                    <h2>{{ curso.Course_Name }}</h2>
                    <p class="curso-subtitle">Duración {{ curso.Course_Duration }} horas</p>
                  </div>
                </div>
              </div>
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>
    </div>
    
    <div *ngIf="!cursos || cursos.length === 0" class="empty-state">
      <p>No hay cursos disponibles</p>
    </div>
  </div>
  

</ion-content>
<app-tab-bar></app-tab-bar>
